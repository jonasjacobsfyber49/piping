<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piping Platform Kanban</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }
        body{
            font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
            background:#f6f5f2;
            color:#2b2b2b;
            padding:25px;
        }
        h1{
            font-size:22px;
            margin-bottom:5px;
        }
        .subtitle{
            color:#777;
            margin-bottom:20px;
            font-size:14px;
        }
        .toolbar{
            display:flex;
            align-items:center;
            gap:10px;
            margin-bottom:20px;
        }
        .filter{
            display:flex;
            gap:8px;
        }
        .filter button{
            border:none;
            background:white;
            padding:8px 14px;
            border-radius:20px;
            cursor:pointer;
            font-size:13px;
            transition:.2s;
        }
        .filter button.active{
            background:#222;
            color:white;
        }
        #addTask{
            margin-left:auto;
            border:none;
            background:#d46c45;
            color:white;
            border-radius:6px;
            padding:9px 16px;
            cursor:pointer;
            font-weight:600;
        }
        .board{
            display:grid;
            grid-template-columns:repeat(4,1fr);
            gap:18px;
        }
        .column {
            background: #ece9df;
            border-radius: 10px;
            padding: 12px;
            min-height: 600px;
            display: flex;
            flex-direction: column;
        }
        .column-header{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:12px;
            font-size:13px;
            font-weight:700;
            text-transform:uppercase;
            color:#666;
        }
        .count{
            background:#d9d4c8;
            padding:2px 8px;
            border-radius:20px;
            font-size:11px;
        }
        .cards {
            flex-grow: 1;
            min-height: 100%;
            padding-bottom: 50px;
        }
        .card{
            background:white;
            border-radius:8px;
            padding:12px;
            margin-bottom:10px;
            cursor:grab;
            box-shadow:0 2px 6px rgba(0,0,0,.08);
            border-left:5px solid #ccc;
        }
        .card.dragging{
            opacity:.4;
        }
        .card.owner-jonas{
            border-left-color:#d46c45;
        }
        .card.owner-luis{
            border-left-color:#3c7dd9;
        }
        .card-text{
            white-space:pre-wrap;
            line-height:1.45;
            font-size:14px;
        }
        .card-duedate {
            font-size: 11px;
            color: #d46c45;
            background: #fdf2ee;
            padding: 2px 6px;
            border-radius: 4px;
            display: inline-block;
            margin-top: 8px;
            font-weight: 500;
        }
        .card-footer{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-top:10px;
        }
        .owner{
            font-size:11px;
            font-weight:bold;
            text-transform:uppercase;
        }
        .actions{
            display:flex;
            gap:8px;
        }
        .actions button{
            border:none;
            background:none;
            cursor:pointer;
            color:#888;
            font-size:14px;
        }
        
        /* KLAPBAAR ARCHIVE CSS */
        .column[data-status="archive"] {
            transition: width 0.3s ease, min-width 0.3s ease;
            cursor: pointer;
        }
        .column.collapsed {
            min-width: 50px !important;
            width: 50px !important;
            padding: 12px 5px;
            background: #dfdad0;
            overflow: hidden;
        }
        .column.collapsed .column-header {
            writing-mode: vertical-rl;
            transform: rotate(180deg);
            align-items: center;
            gap: 15px;
            height: 100%;
            margin-bottom: 0;
        }
        .column.collapsed .cards {
            display: none;
        }

        .modalOverlay{
            position:fixed;
            inset:0;
            background:rgba(0,0,0,.45);
            display:none;
            align-items:center;
            justify-content:center;
        }
        .modalOverlay.show{
            display:flex;
        }
        .modal{
            width:650px;
            max-width:90vw;
            max-height:90vh;
            overflow:auto;
            background:white;
            border-radius:10px;
            padding:20px;
        }
        .modal textarea{
            width:100%;
            min-height:120px;
            resize:vertical;
            margin:10px 0;
            padding:10px;
        }
        .row{
            display:flex;
            gap:15px;
            margin-bottom:15px;
            flex-wrap: wrap;
        }
        .field-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
            flex: 1;
            min-width: 140px;
        }
        .field-group label {
            font-size: 12px;
            font-weight: 600;
            color: #666;
        }
        .field-group select, .field-group input {
            padding:8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .modalButtons{
            display:flex;
            justify-content:flex-end;
            gap:10px;
        }
        .modalButtons button{
            border:none;
            padding:9px 16px;
            border-radius:6px;
            cursor:pointer;
        }
        .primary{
            background:#222;
            color:white;
        }
        .secondary{
            background:#ddd;
        }
        .danger{
            background:#cc3333;
            color:white;
        }
        .comments{
            margin-top:25px;
            border-top:1px solid #eee;
            padding-top:20px;
        }
        .comment{
            background:#f7f7f7;
            border-radius:8px;
            padding:10px;
            margin-bottom:10px;
        }
        .commentAuthor{
            font-weight:bold;
            font-size:12px;
            margin-bottom:4px;
        }
        .commentDate{
            color:#888;
            font-size:11px;
        }
        .commentText{
            margin-top:5px;
            white-space:pre-wrap;
        }
    </style>
</head>
<body>

<h1>Piping Platform</h1>
<div class="subtitle">Shared Kanban powered by Supabase</div>

<div class="toolbar">
    <div class="filter">
        <button class="active" data-filter="all">All</button>
        <button data-filter="jonas">Jonas</button>
        <button data-filter="luis">Luis</button>
    </div>
    <button id="addTask">+ Add Task</button>
</div>

<div class="board">
    <div class="column" data-status="todo">
        <div class="column-header">
            <span>To Do</span>
            <span class="count" id="count-todo">0</span>
        </div>
        <div class="cards" id="todo"></div>
    </div>

    <div class="column" data-status="inprogress">
        <div class="column-header">
            <span>In Progress</span>
            <span class="count" id="count-inprogress">0</span>
        </div>
        <div class="cards" id="inprogress"></div>
    </div>

    <div class="column" data-status="done">
        <div class="column-header">
            <span>Done</span>
            <span class="count" id="count-done">0</span>
        </div>
        <div class="cards" id="done"></div>
    </div>

    <div class="column collapsed" data-status="archive" id="col-archive">
        <div class="column-header">
            <span>Archive</span>
            <span class="count" id="count-archive">0</span>
        </div>
        <div class="cards" id="archive"></div>
    </div>
</div>

<div class="modalOverlay" id="modal">
    <div class="modal">
        <h2 id="modalTitle">Task</h2>
        <textarea id="taskText"></textarea>

        <div class="row">
            <div class="field-group">
                <label for="taskOwner">Owner</label>
                <select id="taskOwner">
                    <option value="jonas">Jonas</option>
                    <option value="luis">Luis</option>
                </select>
            </div>

            <div class="field-group">
                <label for="taskStatus">Status</label>
                <select id="taskStatus">
                    <option value="todo">To Do</option>
                    <option value="inprogress">In Progress</option>
                    <option value="done">Done</option>
                    <option value="archive" id="statusOptArchive">Archive</option>
                </select>
            </div>

            <div class="field-group">
                <label for="taskDueDate">Due Date</label>
                <input type="date" id="taskDueDate">
            </div>
        </div>

        <div class="modalButtons">
            <button class="danger" id="deleteTaskBtn" style="margin-right:auto;">Delete</button>
            <button class="secondary" id="cancelBtn">Cancel</button>
            <button class="primary" id="saveTaskBtn">Save</button>
        </div>

        <div class="comments">
            <h3>Comments</h3>
            <div id="commentsContainer"></div>
            <textarea id="newComment" placeholder="Write a comment..."></textarea>
            <div class="modalButtons">
                <button class="primary" id="addCommentBtn">Post Comment</button>
            </div>
        </div>
    </div>
</div>

<script>
const { createClient } = supabase;

const supabaseClient = createClient(
    "https://vfpbvxjnjpqmhaioanmx.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZmcGJ2eGpuanBxbWhhaW9hbm14Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxODQ4NzYsImV4cCI6MjA5OTc2MDg3Nn0.3buufHgFkTOz9heAUR9NwntOk8jWMnYsipFRf-IAPxg"
);

let tasks = [];
let comments = [];
let currentFilter = "all";
let editingTask = null;
let draggedTask = null;
let isUpdatingDatabase = false;
let isModalOpen = false; 

async function loadTasks() {
    if (isModalOpen) return;

    const { data, error } = await supabaseClient
        .from("kanban_tasks")
        .select("*")
        .order("sort_order", { ascending: true });

    if (error) return;

    tasks = data || [];
    await loadComments();
    renderBoard();
}

async function loadComments() {
    const { data, error } = await supabaseClient
        .from("kanban_comments")
        .select("*")
        .order("created_at");

    if (error) {
        comments = [];
        return;
    }

    comments = data || [];
    tasks.forEach(task => {
        task.comments = comments.filter(c => String(c.task_id) === String(task.id));
    });
}

async function createTask(task) {
    const { error } = await supabaseClient
        .from("kanban_tasks")
        .insert(task);

    if (error) {
        alert(error.message);
        return;
    }
    await loadTasks();
}

async function updateTask(id, values) {
    const { error } = await supabaseClient
        .from("kanban_tasks")
        .update(values)
        .eq("id", id);

    if (error) {
        alert(error.message);
        return;
    }
    await loadTasks();
}

async function removeTask(id) {
    const { error } = await supabaseClient
        .from("kanban_tasks")
        .delete()
        .eq("id", id);

    if (error) {
        alert(error.message);
        return;
    }
    await loadTasks();
}

async function addComment(taskId, text) {
    const { error } = await supabaseClient
        .from("kanban_comments")
        .insert({
            task_id: taskId,
            author: "Jonas",
            text: text
        });

    if (error) {
        alert(error.message);
        return;
    }
    await loadTasks();
}

function getTask(id) {
    return tasks.find(t => String(t.id) === String(id));
}

function getComments(taskId) {
    return comments.filter(c => String(c.task_id) === String(taskId));
}

function renderBoard() {
    renderColumn("todo");
    renderColumn("inprogress");
    renderColumn("done");
    renderColumn("archive");
}

function renderColumn(status) {
    const container = document.getElementById(status);
    if (!container) return;
    container.innerHTML = "";

    let filteredTasks = tasks.filter(t => t.status === status);

    if(currentFilter !== "all"){
        filteredTasks = filteredTasks.filter(t => t.owner === currentFilter);
    }

    document.getElementById(`count-${status}`).textContent = filteredTasks.length;

    filteredTasks.forEach(task => {
        const card = document.createElement("div");
        card.className = `card owner-${task.owner}`;
        card.draggable = true;
        card.dataset.id = task.id;

        const commentCount = task.comments ? task.comments.length : 0;
        
        let dueDateHtml = "";
        if (task.due_date) {
            const dateObj = new Date(task.due_date);
            dueDateHtml = `<div class="card-duedate">📅 ${dateObj.toLocaleDateString('nl-NL', {day: 'numeric', month: 'short'})}</div>`;
        }

        card.innerHTML = `
            <div class="card-text">${escapeHtml(task.text)}</div>
            ${dueDateHtml}
            <div class="card-footer">
                <div class="owner">${task.owner}</div>
                <div class="actions">
                    ${commentCount ? `<span>💬 ${commentCount}</span>` : ""}
                    <button class="editBtn" data-id="${task.id}">✏️</button>
                </div>
            </div>
        `;

        card.addEventListener("dragstart", handleDragStart);
        card.addEventListener("dragend", handleDragEnd);
        container.appendChild(card);
    });

    attachEditButtons();
}

function attachEditButtons(){
    document.querySelectorAll(".editBtn").forEach(btn => {
        btn.onclick = () => {
            openTask(btn.dataset.id);
        };
    });
}

function escapeHtml(text){
    if(!text) return "";
    return text
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;");
}

document.querySelectorAll("[data-filter]").forEach(btn => {
    btn.addEventListener("click", () => {
        document.querySelectorAll("[data-filter]").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        currentFilter = btn.dataset.filter;
        renderBoard();
    });
});

// =========================
// OPEN / CLOSE MODAL
// =========================
function openTask(id){
    editingTask = getTask(id);
    if(!editingTask) return;

    isModalOpen = true;
    document.getElementById("modal").classList.add("show");
    document.getElementById("deleteTaskBtn").style.display = "block"; 
    document.getElementById("taskText").value = editingTask.text || "";
    document.getElementById("taskOwner").value = editingTask.owner || "jonas";
    document.getElementById("taskStatus").value = editingTask.status || "todo";
    document.getElementById("taskDueDate").value = editingTask.due_date || "";

    const archiveOption = document.getElementById("statusOptArchive");
    if (editingTask.status === "done" || editingTask.status === "archive") {
        archiveOption.disabled = false;
    } else {
        archiveOption.disabled = true;
    }

    renderComments();
}

function closeModal(){
    editingTask = null;
    isModalOpen = false;
    document.getElementById("modal").classList.remove("show");
    document.getElementById("newComment").value = "";
    loadTasks(); 
}

document.getElementById("cancelBtn").onclick = closeModal;
document.getElementById("modal").onclick = e => {
    if(e.target.id === "modal"){
        closeModal();
    }
};

// =========================
// COMMENTS
// =========================
function renderComments(){
    const container = document.getElementById("commentsContainer");
    container.innerHTML = "";

    if(!editingTask) return;

    const list = getComments(editingTask.id);

    if(list.length === 0){
        container.innerHTML = "<p>No comments yet.</p>";
        return;
    }

    list.forEach(comment => {
        const div = document.createElement("div");
        div.className = "comment";
        div.innerHTML = `
            <div class="commentAuthor">${comment.author}</div>
            <div class="commentDate">${new Date(comment.created_at).toLocaleString()}</div>
            <div class="commentText">${escapeHtml(comment.text)}</div>
        `;
        container.appendChild(div);
    });
}

// =========================
// ONE UNIFIED SAVE TASK
// =========================
document.getElementById("saveTaskBtn").onclick = async () => {
    const text = document.getElementById("taskText").value.trim();
    if(text === ""){
        alert("Task text required");
        return;
    }

    const owner = document.getElementById("taskOwner").value;
    const status = document.getElementById("taskStatus").value;
    const dueDate = document.getElementById("taskDueDate").value || null;

    if(editingTask){
        await updateTask(editingTask.id, { text, owner, status, due_date: dueDate });
    } else {
        const maxOrder = tasks.length ? Math.max(...tasks.map(t => t.sort_order || 0)) : 0;
        await createTask({
            text,
            owner,
            status,
            sort_order: maxOrder + 1,
            due_date: dueDate
        });
    }

    closeModal();
};

// =========================
// DELETE
// =========================
document.getElementById("deleteTaskBtn").onclick = async () => {
    if(!editingTask) return;
    if(!confirm("Delete task?")){
        return;
    }
    await removeTask(editingTask.id);
    closeModal();
};

// =========================
// NEW COMMENT
// =========================
document.getElementById("addCommentBtn").onclick = async () => {
    if(!editingTask) return;

    const text = document.getElementById("newComment").value.trim();
    if(text === "") return;

    await addComment(editingTask.id, text);
    document.getElementById("newComment").value = "";
    
    await loadComments();
    renderComments();
};

// =========================
// ADD TASK TRIGGER
// =========================
document.getElementById("addTask").onclick = () => {
    editingTask = null;
    isModalOpen = true;

    document.getElementById("modal").classList.add("show");
    document.getElementById("deleteTaskBtn").style.display = "none"; 
    document.getElementById("taskText").value = "";
    document.getElementById("taskOwner").value = "jonas";
    document.getElementById("taskStatus").value = "todo";
    document.getElementById("taskDueDate").value = "";
    document.getElementById("statusOptArchive").disabled = true; 
    document.getElementById("commentsContainer").innerHTML = "";
};

// =========================
// DRAG & DROP
// =========================
function handleDragStart(e){
    draggedTask = e.target.dataset.id;
    e.target.classList.add("dragging");
}

function handleDragEnd(e){
    e.target.classList.remove("dragging");
    draggedTask = null;
}

document.querySelectorAll(".cards").forEach(container => {
    container.addEventListener("dragover", e => {
        e.preventDefault();
        const draggingCard = document.querySelector(".dragging");
        if (!draggingCard) return;

        const afterElement = getDragAfterElement(container, e.clientY);
        if (afterElement == null) {
            container.appendChild(draggingCard);
        } else {
            container.insertBefore(draggingCard, afterElement);
        }
    });

    container.addEventListener("drop", async e => {
        e.preventDefault();
        if(!draggedTask) return;

        const newStatus = container.id;
        const targetTask = getTask(draggedTask);

        if (newStatus === "archive" && targetTask && targetTask.status !== "done" && targetTask.status !== "archive") {
            alert("Je mag een taak pas archiveren als deze besproken is (dus vanuit de 'Done' kolom komt).");
            loadTasks(); 
            return;
        }

        isUpdatingDatabase = true;
        const cardElements = [...container.querySelectorAll(".card")];
        const rowsToUpdate = [];

        cardElements.forEach((cardEl, index) => {
            const cardId = cardEl.dataset.id;
            const newOrder = index + 1;

            const localTask = tasks.find(t => String(t.id) === String(cardId));
            if (localTask) {
                localTask.status = newStatus;
                localTask.sort_order = newOrder;
            }

            rowsToUpdate.push({
                id: cardId,
                status: newStatus,
                sort_order: newOrder
            });
        });

        tasks.sort((a, b) => (a.sort_order || 0) - (b.sort_order || 0));
        renderBoard();

        const { error } = await supabaseClient
            .from("kanban_tasks")
            .upsert(rowsToUpdate);

        if (error) {
            alert("Database update mislukt: " + error.message);
        }

        setTimeout(() => {
            isUpdatingDatabase = false;
        }, 800);
    });
});

function getDragAfterElement(container, y) {
    const draggableElements = [...container.querySelectorAll(".card:not(.dragging)")];

    return draggableElements.reduce((closest, child) => {
        const box = child.getBoundingClientRect();
        const offset = y - box.top - box.height / 2;
        if (offset < 0 && offset > closest.offset) {
            return { offset: offset, element: child };
        } else {
            return closest;
        }
    }, { offset: Number.NEGATIVE_INFINITY }).element;
}

// =========================
// COLLAPSIBLE ARCHIVE
// =========================
document.getElementById("col-archive").addEventListener("click", function(e) {
    if (e.target.closest(".card") || e.target.closest(".editBtn")) return;
    this.classList.toggle("collapsed");
});

// =========================
// AUTO REFRESH
// =========================
setInterval(async () => {
    if (!isModalOpen && !isUpdatingDatabase && !draggedTask) {
        await loadTasks();
    }
}, 3000);

// INITIAL LOAD
loadTasks();

// ESC CLOSE
document.addEventListener("keydown", e => {
    if(e.key === "Escape"){
        closeModal();
    }
});
</script>

</body>
</html>
